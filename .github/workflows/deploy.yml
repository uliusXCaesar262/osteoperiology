name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - run: npm install
      - name: Build site
        env:
          NEXT_PUBLIC_BREVO_API_KEY: ${{ secrets.NEXT_PUBLIC_BREVO_API_KEY }}
          NEXT_PUBLIC_BREVO_LIST_ID: ${{ secrets.NEXT_PUBLIC_BREVO_LIST_ID }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
